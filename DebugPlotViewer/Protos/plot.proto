syntax = "proto3";

option csharp_namespace = "DebugPlotViewer.Protos";

package TSDebugPlot;

// Matches the LabVIEW gRPC service: /TSDebugPlot.Plot/PlotData
service Plot {
  rpc PlotData (PlotDataRequest) returns (PlotDataReply);
}

message PlotDataRequest {
  string data = 1;
}

message PlotDataReply {
  string message = 1;
}
